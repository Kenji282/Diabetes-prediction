<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style6.css') }}">

</head>
<body>
    <div class="container">
        <header>
            <h1>BMI Calculator</h1>
        </header>
        <main>
            <section>
                <h2>Calculate Your BMI</h2>
                
                <form id="bmiForm">
                    <label for="weight">Weight (kg):</label>
                    <input type="number" id="weight" required>
                    <br>
                    <label for="height">Height (m):</label>
                    <input type="number" id="height" step="0.01" required>
                    <br>
                    <button type="submit">Calculate BMI</button>
                </form>
                <p id="result"></p>
                
            </section>
        </main>
        <footer>
            <h5>The calculation is maynot be accuarte</h5>
            <h4> Average BMI of a human is 18.5 to 24.9</h4>
        </footer>
    </div>
    <script>
        document.getElementById('bmiForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const bmi = (weight / (height * height)).toFixed(2);
            document.getElementById('result').innerText = 'Your BMI is: ' + bmi;
        });
    </script>
</body>
</html>
