<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Thickness Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style6.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Skin Thickness Calculator</h1>
        </header>
        <main>
            <section>
                <h2>Calculate Your Skin Thickness</h2>
                <form id="skinThicknessForm">
                    <label for="weight">Weight (kg):</label>
                    <input type="number" id="weight" required>
                    <br>
                    <label for="height">Height (m):</label>
                    <input type="number" id="height" step="0.01" required>
                    <br>
                    <label for="bmi">BMI:</label>
                    <input type="number" id="bmi" required>
                    <br>
                    <label for="skin_thickness">Skin Thickness (mm):</label>
                    <input type="number" id="skin_thickness" readonly>

                    <br>

                    <br>
                    <button type="submit">Calculate</button>
                </form>
                <p id="result"></p>
            </section>
        </main>
        <footer>
            <h5>The calculation is maynot be accuarte</h5>
        </footer>
    </div>
    <script>
        document.getElementById('skinThicknessForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const bmi = weight / (height * height);
            const skinThickness = 0.5 * bmi + 5;
            document.getElementById('skin_thickness').value = skinThickness.toFixed(2);
            document.getElementById('result').innerText = 'Your skin thickness is: ' + skinThickness.toFixed(2) + ' mm';

        });
    </script>
</body>
</html>
