<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Diabetes Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-box">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <h2 class="fade-in">Signup</h2>
            <p>Create your account</p>
            <form action="{{ url_for('signup') }}" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" minlength="6" placeholder="Password" required>
                <input type="password" name="confirm_password" minlength="6" placeholder="Confirm Password" required>
                <button type="submit" class="btn">Signup</button>
            </form>
            <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </div>
    </div>
</body>
</html>
